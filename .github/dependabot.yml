version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
  - package-ecosystem: "pip"
    directory: "/python/nyancad"
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/python/nyancad-server"
    schedule:
      interval: "weekly"
